<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0F1117"/>
  <meta name="description" content="Offline habit tracker with city builder"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Progress"/>
  <title>Progress Tracker</title>
  
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="css/main.css"/>
  
  <!-- Dexie.js for IndexedDB -->
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
  <!-- Chart/Graph utilities (we will draw SVGs mostly, but let's keep it clean) -->
</head>
<body>
<div id="app-wrapper">
  <button onclick="App.triggerInstall()" class="install-corner-btn desktop-only" style="position:absolute;top:16px;right:16px">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    Download App
  </button>
  
  <!-- Desktop Sidebar Navigation (>1200px) -->
  <aside id="desktop-sidebar" class="desktop-only">
    <div class="sidebar-logo">
      <div class="avatar-circle">PT</div>
      <span class="sidebar-title">Progress Tracker</span>
    </div>
    <nav class="sidebar-nav">
      <!-- Generated via JS to match bottom nav -->
    </nav>
    <div class="sidebar-stats">
      <!-- User stats injected here -->
    </div>
  </aside>

  <main id="app">
    <!-- Screens -->
    <div id="screen-home" class="screen active"></div>
    <div id="screen-stats" class="screen"></div>
    <div id="screen-city" class="screen"></div>
    <div id="screen-calendar" class="screen"></div>
    <div id="screen-more" class="screen">
      <!-- More menu container -->
      <div class="top-bar">
        <div class="top-bar-title">More</div>
      </div>
      <div class="more-menu">
        <button class="more-menu-btn" data-target="weekly-review">
          <span>Weekly Review</span><span>→</span>
        </button>
        <button class="more-menu-btn" data-target="notes">
          <span>Notes</span><span>→</span>
        </button>
        <button class="more-menu-btn" data-target="settings">
          <span>Settings</span><span>→</span>
        </button>
      </div>
    </div>
    
    <!-- Pushed Screens from More -->
    <div id="screen-weekly-review" class="screen push-screen"></div>
    <div id="screen-notes" class="screen push-screen"></div>
    <div id="screen-settings" class="screen push-screen"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-tab active" data-tab="home" id="nav-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Home</span><span class="nav-indicator"></span>
      </button>
      <button class="nav-tab" data-tab="stats" id="nav-stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">Stats</span><span class="nav-indicator"></span>
      </button>
      <button class="nav-tab" data-tab="city" id="nav-city">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="7" height="13"/><rect x="14" y="3" width="7" height="18"/><path d="M10 21V12h4v9"/></svg>
        <span class="nav-label">City</span><span class="nav-indicator"></span>
      </button>
      <button class="nav-tab" data-tab="calendar" id="nav-calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="nav-label">Calendar</span><span class="nav-indicator"></span>
      </button>
      <button class="nav-tab" data-tab="more" id="nav-more">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        <span class="nav-label">More</span><span class="nav-indicator"></span>
      </button>
    </nav>

    <!-- FAB -->
    <button id="fab" aria-label="Add Habit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Overlays & Bottom Sheets -->
    <div id="mood-checkin-overlay" class="dialog-overlay hidden">
      <div id="mood-checkin-card" class="dialog-card">
        <!-- Rendered via JS -->
      </div>
    </div>
    
    <div id="sheet-overlay" class="sheet-overlay hidden"></div>
    <div id="add-habit-sheet" class="bottom-sheet hidden"></div>
    <div id="habit-note-sheet" class="bottom-sheet hidden"></div>
    <div id="day-detail-sheet" class="bottom-sheet hidden"></div>

    <!-- Celebration & Alerts -->
    <div id="celebration-overlay" class="hidden"></div>
    <div id="reset-dialog-overlay" class="dialog-overlay hidden"><div id="reset-dialog" class="dialog-card"></div></div>
    <div id="snackbar" class="snackbar hidden"></div>

    <div id="install-banner" class="install-banner hidden">
      <span>Add to Home Screen for the full experience</span>
      <button id="install-btn">Install</button>
      <button id="install-dismiss">✕</button>
    </div>
  </main>
  
  <!-- Desktop Right Panel (>1200px) -->
  <aside id="desktop-right-panel" class="desktop-only">
    <!-- Today summary, sticky aside -->
  </aside>
</div>

<!-- Confetti Canvas -->
<canvas id="confetti-canvas"></canvas>

<!-- Scripts -->
<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script src="js/city-svg.js"></script>
<script src="js/screens/home.js"></script>
<script src="js/screens/stats.js"></script>
<script src="js/screens/city.js"></script>
<script src="js/screens/calendar.js"></script>
<script src="js/screens/weekly-review.js"></script>
<script src="js/screens/notes.js"></script>
<script src="js/screens/settings.js"></script>
<script src="js/screens/add-habit.js"></script>
<script src="js/celebration.js"></script>
<script src="js/app.js"></script>
</body>
</html>
